name: Build & Deploy to EC2 via Docker

on:
  push:
    branches:
      - diwas
  workflow_dispatch:
    inputs:
      action:
        description: Action to run
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - diagnose
          - bootstrap_db
      run_db_seeds:
        description: Force run seed.sql during this run
        required: false
        default: false
        type: boolean

jobs:
  # ─────────────────────────────────────────────────────────
  # DEPLOY (default on every push)
  #   Pulls code, builds, runs NEW alembic migrations only.
  #   Does NOT wipe the database or re-seed.
  # ─────────────────────────────────────────────────────────
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        env:
          RUN_DB_SEEDS_OVERRIDE: ${{ github.event.inputs.run_db_seeds }}
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: RUN_DB_SEEDS_OVERRIDE
          script: |
            set -e

            if [ ! -d "/home/ec2-user/app" ]; then
              mkdir -p /home/ec2-user/app
              chown ec2-user:ec2-user /home/ec2-user/app
            fi

            sudo yum install -y git || sudo apt-get install -y git

            cd /home/ec2-user/app
            if [ -d ".git" ]; then
              git fetch origin
              git checkout diwas
              git reset --hard origin/diwas
              git clean -fd
            else
              git clone https://github.com/Kedar-V/Duke_Capstone.git .
              git fetch origin
              git checkout diwas
              git reset --hard origin/diwas
            fi

            if ! command -v docker >/dev/null 2>&1; then
              sudo yum install -y docker || (sudo apt-get update && sudo apt-get install -y docker.io)
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ec2-user
            fi

            if ! command -v docker-compose >/dev/null 2>&1; then
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            if [ ! -f ".env" ]; then
              echo "Missing /home/ec2-user/app/.env on EC2"
              exit 1
            fi

            set -a
            . ./.env
            set +a

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL is missing in EC2 .env"
              exit 1
            fi
            if [ -z "$TEAMMATE_PREFS_KEY" ]; then
              echo "TEAMMATE_PREFS_KEY is missing in EC2 .env"
              exit 1
            fi

            echo "==> Disk usage before cleanup"
            df -h
            docker system df || true

            docker-compose down

            echo "==> Pruning old Docker data to free disk (safe: no volumes)"
            docker image prune -af || true
            docker builder prune -af || true
            docker system prune -af || true

            echo "==> Disk usage after cleanup"
            df -h
            docker system df || true

            docker-compose build

            # ── Run only NEW alembic migrations (safe, incremental) ──
            echo "==> Running alembic migrations..."
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini upgrade head"
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini current"

            # ── Optional: run seeds only if explicitly requested ──
            RUN_DB_SEEDS_EFFECTIVE=${RUN_DB_SEEDS:-false}
            if [ "$RUN_DB_SEEDS_OVERRIDE" = "true" ]; then
              RUN_DB_SEEDS_EFFECTIVE=true
            fi
            if [ "$RUN_DB_SEEDS_EFFECTIVE" = "true" ]; then
              REPO_ROOT="/home/ec2-user/app"
              echo "==> Running seed.sql (manually requested)..."
              docker-compose run --rm -v "$REPO_ROOT:/repo" -e DATABASE_URL="$DATABASE_URL" api python /app/scripts/run_sql.py /repo/seed.sql
            fi

            docker-compose up -d
            echo "==> Deploy complete!"

  # ─────────────────────────────────────────────────────────
  # DIAGNOSE (manual trigger only)
  # ─────────────────────────────────────────────────────────
  diagnose:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'diagnose'
    runs-on: ubuntu-latest

    steps:
      - name: Remote diagnostics on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/app

            echo "=== Git state ==="
            git rev-parse --abbrev-ref HEAD || true
            git log -1 --oneline || true

            if [ -f ".env" ]; then
              set -a
              . ./.env
              set +a
            else
              echo "Missing .env"
              exit 1
            fi

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL missing"
              exit 1
            fi

            echo "=== Disk usage ==="
            df -h || true
            docker system df || true

            echo "=== Docker status ==="
            docker-compose ps || true

            echo "=== Alembic current ==="
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini current" || true

            echo "=== Schema checks ==="
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api python /app/scripts/diagnose_schema.py || true

            echo "=== API logs (tail 200) ==="
            docker-compose logs --tail=200 api || true

  # ─────────────────────────────────────────────────────────
  # BOOTSTRAP DB (manual trigger only — DESTRUCTIVE)
  #   Wipes the entire database and rebuilds from schema.sql.
  #   Only use this when the DB is in an unrecoverable state.
  # ─────────────────────────────────────────────────────────
  bootstrap-db:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'bootstrap_db'
    runs-on: ubuntu-latest

    steps:
      - name: Fresh bootstrap DB on EC2
        uses: appleboy/ssh-action@v0.1.7
        env:
          RUN_DB_SEEDS_OVERRIDE: ${{ github.event.inputs.run_db_seeds }}
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: RUN_DB_SEEDS_OVERRIDE
          script: |
            set -e
            cd /home/ec2-user/app

            if [ ! -f ".env" ]; then
              echo "Missing .env"
              exit 1
            fi

            set -a
            . ./.env
            set +a

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL missing"
              exit 1
            fi

            RUN_DB_SEEDS_EFFECTIVE=${RUN_DB_SEEDS:-false}
            if [ "$RUN_DB_SEEDS_OVERRIDE" = "true" ]; then
              RUN_DB_SEEDS_EFFECTIVE=true
            fi

            echo "==> Disk usage before cleanup"
            df -h
            docker system df || true

            docker-compose down

            echo "==> Pruning old Docker data to free disk (safe: no volumes)"
            docker image prune -af || true
            docker builder prune -af || true
            docker system prune -af || true

            echo "==> Disk usage after cleanup"
            df -h
            docker system df || true

            docker-compose build

            REPO_ROOT="/home/ec2-user/app"

            echo "==> WARNING: Wiping entire database..."
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api python /app/scripts/wipe_schema.py

            echo "==> Applying schema.sql..."
            docker-compose run --rm -v "$REPO_ROOT:/repo" -e DATABASE_URL="$DATABASE_URL" api python /app/scripts/run_sql.py /repo/schema.sql

            echo "==> Stamping alembic at head..."
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini stamp head"
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini current"

            if [ "$RUN_DB_SEEDS_EFFECTIVE" = "true" ]; then
              echo "==> Running seed.sql..."
              docker-compose run --rm -v "$REPO_ROOT:/repo" -e DATABASE_URL="$DATABASE_URL" api python /app/scripts/run_sql.py /repo/seed.sql
            fi

            docker-compose up -d
            echo "==> Bootstrap complete!"
