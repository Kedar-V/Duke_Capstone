name: Build & Deploy to EC2 via Docker

on:
  push:
    branches:
      - diwas
  workflow_dispatch:
    inputs:
      action:
        description: Action to run
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - diagnose
          - bootstrap_db
      run_db_seeds:
        description: Force run seed.sql during this run
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        env:
          RUN_DB_SEEDS_OVERRIDE: ${{ github.event.inputs.run_db_seeds }}
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: RUN_DB_SEEDS_OVERRIDE
          script: |
            set -e

            if [ ! -d "/home/ec2-user/app" ]; then
              mkdir -p /home/ec2-user/app
              chown ec2-user:ec2-user /home/ec2-user/app
            fi

            sudo yum install -y git || sudo apt-get install -y git

            cd /home/ec2-user/app
            if [ -d ".git" ]; then
              git fetch origin
              git checkout diwas
              git reset --hard origin/diwas
              git clean -fd
            else
              git clone https://github.com/Kedar-V/Duke_Capstone.git .
              git fetch origin
              git checkout diwas
              git reset --hard origin/diwas
            fi

            if ! command -v docker >/dev/null 2>&1; then
              sudo yum install -y docker || (sudo apt-get update && sudo apt-get install -y docker.io)
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ec2-user
            fi

            if ! command -v docker-compose >/dev/null 2>&1; then
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            if [ ! -f ".env" ]; then
              echo "Missing /home/ec2-user/app/.env on EC2"
              exit 1
            fi

            set -a
            . ./.env
            set +a

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL is missing in EC2 .env"
              exit 1
            fi
            if [ -z "$TEAMMATE_PREFS_KEY" ]; then
              echo "TEAMMATE_PREFS_KEY is missing in EC2 .env"
              exit 1
            fi

            docker-compose down
            docker-compose build

            # ── Fresh bootstrap: wipe → schema.sql → stamp alembic → seed ──
            # Mount repo root into api container so schema.sql and seed.sql are accessible
            REPO_ROOT="/home/ec2-user/app"

            echo "==> Wiping public schema..."
            docker-compose run --rm -v "$REPO_ROOT:/repo" -e DATABASE_URL="$DATABASE_URL" api python -c "
            from sqlalchemy import create_engine, text; import os
            e = create_engine(os.environ['DATABASE_URL'], pool_pre_ping=True)
            with e.connect() as c:
                c.execute(text('DROP SCHEMA IF EXISTS public CASCADE'))
                c.execute(text('CREATE SCHEMA public'))
                c.commit()
            print('Done: schema wiped')
            "

            echo "==> Applying schema.sql..."
            docker-compose run --rm -v "$REPO_ROOT:/repo" -e DATABASE_URL="$DATABASE_URL" api python -c "
            from sqlalchemy import create_engine, text; import os
            e = create_engine(os.environ['DATABASE_URL'], pool_pre_ping=True)
            with open('/repo/schema.sql') as f: sql = f.read()
            with e.connect() as c:
                c.execute(text(sql))
                c.commit()
            print('Done: schema.sql applied')
            "

            echo "==> Stamping alembic at head..."
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini stamp head"
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini current"

            echo "==> Verifying required tables..."
            for REQUIRED_TABLE in projects companies project_comments assignment_rule_configs assignment_preview_runs assignment_saved_runs; do
              HAS_TABLE=$(docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api python /app/scripts/table_check.py "$REQUIRED_TABLE")
              if [ "$HAS_TABLE" != "true" ]; then
                echo "FAIL: Missing required table: ${REQUIRED_TABLE}"
                exit 1
              fi
              echo "  OK: ${REQUIRED_TABLE}"
            done

            echo "==> Running seed.sql..."
            docker-compose run --rm -v "$REPO_ROOT:/repo" -e DATABASE_URL="$DATABASE_URL" api python -c "
            from sqlalchemy import create_engine, text; import os
            e = create_engine(os.environ['DATABASE_URL'], pool_pre_ping=True)
            with open('/repo/seed.sql') as f: sql = f.read()
            with e.connect() as c:
                c.execute(text(sql))
                c.commit()
            print('Done: seed.sql applied')
            "

            docker-compose up -d
            echo "==> Deploy complete!"

  diagnose:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'diagnose'
    runs-on: ubuntu-latest

    steps:
      - name: Remote diagnostics on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/app

            echo "=== Git state ==="
            git rev-parse --abbrev-ref HEAD || true
            git log -1 --oneline || true

            if [ -f ".env" ]; then
              set -a
              . ./.env
              set +a
            else
              echo "Missing .env"
              exit 1
            fi

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL missing"
              exit 1
            fi

            echo "=== Docker status ==="
            docker-compose ps || true

            echo "=== Alembic current ==="
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini current" || true

            echo "=== Schema checks via SQLAlchemy ==="
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api python /app/scripts/diagnose_schema.py || true

            echo "=== API logs (tail 200) ==="
            docker-compose logs --tail=200 api || true

  bootstrap-db:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'bootstrap_db'
    runs-on: ubuntu-latest

    steps:
      - name: Fresh bootstrap DB on EC2
        uses: appleboy/ssh-action@v0.1.7
        env:
          RUN_DB_SEEDS_OVERRIDE: ${{ github.event.inputs.run_db_seeds }}
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: RUN_DB_SEEDS_OVERRIDE
          script: |
            set -e
            cd /home/ec2-user/app

            if [ ! -f ".env" ]; then
              echo "Missing .env"
              exit 1
            fi

            set -a
            . ./.env
            set +a

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL missing"
              exit 1
            fi

            RUN_DB_SEEDS_EFFECTIVE=${RUN_DB_SEEDS:-false}
            if [ "$RUN_DB_SEEDS_OVERRIDE" = "true" ]; then
              RUN_DB_SEEDS_EFFECTIVE=true
            fi

            docker-compose down
            docker-compose build

            REPO_ROOT="/home/ec2-user/app"

            echo "Bootstrapping database from schema.sql..."
            docker-compose run --rm -v "$REPO_ROOT:/repo" -e DATABASE_URL="$DATABASE_URL" api python -c "
            from sqlalchemy import create_engine, text; import os
            e = create_engine(os.environ['DATABASE_URL'], pool_pre_ping=True)
            with e.connect() as c:
                c.execute(text('DROP SCHEMA IF EXISTS public CASCADE'))
                c.execute(text('CREATE SCHEMA public'))
                c.commit()
            with open('/repo/schema.sql') as f: sql = f.read()
            with e.connect() as c:
                c.execute(text(sql))
                c.commit()
            print('Schema bootstrapped')
            "

            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini stamp head"
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini current"

            if [ "$RUN_DB_SEEDS_EFFECTIVE" = "true" ]; then
              docker-compose run --rm -v "$REPO_ROOT:/repo" -e DATABASE_URL="$DATABASE_URL" api python -c "
            from sqlalchemy import create_engine, text; import os
            e = create_engine(os.environ['DATABASE_URL'], pool_pre_ping=True)
            with open('/repo/seed.sql') as f: sql = f.read()
            with e.connect() as c:
                c.execute(text(sql))
                c.commit()
            print('Seed data applied')
            "
            fi

            docker-compose up -d
