name: Build & Deploy to EC2 via Docker

on:
  push:
    branches:
      - diwas
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - diagnose
      run_db_seeds:
        description: "Force run seed.sql during this run"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        env:
          RUN_DB_SEEDS_OVERRIDE: ${{ github.event.inputs.run_db_seeds }}
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: RUN_DB_SEEDS_OVERRIDE
          script: |
            set -e

            if [ ! -d "/home/ec2-user/app" ]; then
              mkdir -p /home/ec2-user/app
              chown ec2-user:ec2-user /home/ec2-user/app
            fi

            sudo yum install -y git || sudo apt-get install -y git

            cd /home/ec2-user/app

            if [ -d ".git" ]; then
              git fetch origin
              git checkout diwas
              git reset --hard origin/diwas
              git clean -fd
            else
              git clone https://github.com/Kedar-V/Duke_Capstone.git .
              git fetch origin
              git checkout diwas
              git reset --hard origin/diwas
            fi

            if ! command -v docker >/dev/null 2>&1; then
              sudo yum install -y docker || (sudo apt-get update && sudo apt-get install -y docker.io)
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ec2-user
            fi

            if ! command -v docker-compose >/dev/null 2>&1; then
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            if [ ! -f ".env" ]; then
              echo "Missing /home/ec2-user/app/.env on EC2"
              exit 1
            fi

            set -a
            . ./.env
            set +a

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL is missing in EC2 .env"
              exit 1
            fi
            if [ -z "$TEAMMATE_PREFS_KEY" ]; then
              echo "TEAMMATE_PREFS_KEY is missing in EC2 .env"
              exit 1
            fi

            RUN_DB_SEEDS_EFFECTIVE=${RUN_DB_SEEDS:-false}
            if [ "$RUN_DB_SEEDS_OVERRIDE" = "true" ]; then
              RUN_DB_SEEDS_EFFECTIVE=true
            fi

            docker-compose down
            docker-compose build

            # If DB was initialized from newer schema.sql (projects table) but has no Alembic history,
            # stamp baseline to the last pre-sync revision so upgrade runs only forward-safe migrations.
            DB_URL="${DATABASE_URL/+psycopg2/}"
            HAS_ALEMBIC_VERSION=$(docker run --rm -e DB_URL="$DB_URL" postgres:15 sh -lc "psql \"$DB_URL\" -tAc \"select to_regclass('public.alembic_version') is not null;\"" | tr -d '[:space:]')
            HAS_PROJECTS=$(docker run --rm -e DB_URL="$DB_URL" postgres:15 sh -lc "psql \"$DB_URL\" -tAc \"select to_regclass('public.projects') is not null;\"" | tr -d '[:space:]')
            HAS_CLIENT_INTAKE=$(docker run --rm -e DB_URL="$DB_URL" postgres:15 sh -lc "psql \"$DB_URL\" -tAc \"select to_regclass('public.client_intake_forms') is not null;\"" | tr -d '[:space:]')
            CURRENT_ALEMBIC_REV=$(docker run --rm -e DB_URL="$DB_URL" postgres:15 sh -lc "psql \"$DB_URL\" -tAc \"select coalesce((select version_num from alembic_version limit 1),'');\"" 2>/dev/null | tr -d '[:space:]')

            if [ "$HAS_ALEMBIC_VERSION" != "t" ] && [ "$HAS_PROJECTS" = "t" ] && [ "$HAS_CLIENT_INTAKE" != "t" ]; then
              echo "Detected projects-first schema without Alembic history; stamping 0008_role_profiles baseline"
              docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini stamp 0008_role_profiles"
            fi

            if [ "$HAS_ALEMBIC_VERSION" = "t" ] && [ -z "$CURRENT_ALEMBIC_REV" ] && [ "$HAS_PROJECTS" = "t" ] && [ "$HAS_CLIENT_INTAKE" != "t" ]; then
              echo "Detected empty alembic_version with projects-first schema; stamping 0008_role_profiles baseline"
              docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini stamp 0008_role_profiles"
            fi

            MIGRATION_LOG=$(mktemp)
            set +e
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini upgrade head" >"$MIGRATION_LOG" 2>&1
            MIGRATION_EXIT=$?
            set -e

            if [ "$MIGRATION_EXIT" -ne 0 ]; then
              if grep -q "relation \"client_intake_forms\" does not exist" "$MIGRATION_LOG"; then
                echo "Migration failed on legacy table reference; applying baseline stamp and retrying"
                docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini stamp 0008_role_profiles"
                docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini upgrade head"
              else
                cat "$MIGRATION_LOG"
                exit "$MIGRATION_EXIT"
              fi
            fi

            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini current"

            for REQUIRED_TABLE in projects companies project_comments assignment_rule_configs assignment_preview_runs assignment_saved_runs; do
              HAS_TABLE=$(docker run --rm -e DB_URL="$DB_URL" postgres:15 sh -lc "psql \"$DB_URL\" -tAc \"select to_regclass('public.${REQUIRED_TABLE}') is not null;\"" | tr -d '[:space:]')
              if [ "$HAS_TABLE" != "t" ]; then
                echo "Missing required table after migration: ${REQUIRED_TABLE}"
                exit 1
              fi
            done

            if [ "$RUN_DB_SEEDS_EFFECTIVE" = "true" ]; then
              docker run --rm -v /home/ec2-user/app:/app -e DB_URL="$DB_URL" postgres:15 sh -lc 'psql "$DB_URL" -v ON_ERROR_STOP=1 -f /app/seed.sql'
            fi

            docker-compose up -d

  diagnose:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'diagnose'
    runs-on: ubuntu-latest

    steps:
      - name: Remote diagnostics on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/app

            echo "=== Git state ==="
            git rev-parse --abbrev-ref HEAD || true
            git log -1 --oneline || true

            if [ -f ".env" ]; then
              set -a
              . ./.env
              set +a
            else
              echo "Missing .env"
              exit 1
            fi

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL missing"
              exit 1
            fi

            echo "=== Docker status ==="
            docker-compose ps || true

            echo "=== Alembic current ==="
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini current" || true

            echo "=== Schema checks ==="
            DB_URL="${DATABASE_URL/+psycopg2/}"
            docker run --rm -e DB_URL="$DB_URL" postgres:15 sh -lc "psql \"$DB_URL\" -tAc \"select version_num from alembic_version;\"" || true
            docker run --rm -e DB_URL="$DB_URL" postgres:15 sh -lc "psql \"$DB_URL\" -tAc \"select to_regclass('public.project_comments');\"" || true

            echo "=== API logs (tail 200) ==="
            docker-compose logs --tail=200 api || true
