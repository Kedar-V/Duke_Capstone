name: Build & Deploy to EC2 via Docker Hub

on: [push, pull_request]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # - name: Build and push Docker image
      #   uses: docker/build-push-action@v2
      #   with:
      #     context: .
      #     push: true
      #     tags: kedarvaidya05/bitcoin-app:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            if [ ! -d "/home/ec2-user/app" ]; then
                echo "Creating /home/ec2-user/app..."
                mkdir -p /home/ec2-user/app
                chown ec2-user:ec2-user /home/ec2-user/app
            else
                echo "/home/ec2-user/app already exists, skipping creation."
            fi

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo yum install -y git || sudo apt-get install -y git
      
            cd /home/ec2-user/app
      
            if [ -d ".git" ]; then
              echo "Repo exists, pulling latest changes..."
              git reset --hard
              git clean -fd
              git pull
              git checkout diwas
            else
              echo "Cleaning directory and cloning repo..."
              # sudo rm -rf /home/ec2-user/app/*
              git clone https://github.com/Kedar-V/Duke_Capstone.git .
              git checkout diwas
            fi

      - name: Start containers on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker >/dev/null 2>&1; then
              sudo yum install -y docker || sudo apt-get update && sudo apt-get install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ec2-user
            fi

            if ! command -v docker-compose >/dev/null 2>&1; then
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            cd /home/ec2-user/app
            if [ ! -f ".env" ]; then
              echo "Missing /home/ec2-user/app/.env on EC2"
              exit 1
            fi

            set -a
            . ./.env
            set +a

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL is missing in EC2 .env"
              exit 1
            fi
            if [ -z "$TEAMMATE_PREFS_KEY" ]; then
              echo "TEAMMATE_PREFS_KEY is missing in EC2 .env"
              exit 1
            fi
            RUN_DB_SEEDS=${RUN_DB_SEEDS:-false}

            # Use compose build first so migration job runs against the same image dependencies.
            docker-compose down
            docker-compose build

            # Apply schema changes to RDS before launching refreshed API/frontend containers.
            docker-compose run --rm -e DATABASE_URL="$DATABASE_URL" api sh -lc "alembic -c alembic.ini upgrade head"

            # Optional one-time seed load against RDS (set RUN_DB_SEEDS=true in secrets to enable).
            if [ "$RUN_DB_SEEDS" = "true" ]; then
              DB_URL="${DATABASE_URL/+psycopg2/}"
              docker run --rm -v /home/ec2-user/app:/app -e DB_URL="$DB_URL" postgres:15 sh -lc 'psql "$DB_URL" -v ON_ERROR_STOP=1 -f /app/seed.sql'
            fi

            docker-compose up -d


      # - name: Run startup.sh inside container
      #   uses: appleboy/ssh-action@v0.1.7
      #   with:
      #     host: ${{ secrets.EC2_IP }}
      #     username: ec2-user
      #     key: ${{ secrets.EC2_SSH_KEY }}
      #     script: |
      #       docker exec -i python_week4 bash -c "chmod +x /app/startup/startup.sh && nohup /app/startup/startup.sh > /app/startup/startup.log 2>&1 &"